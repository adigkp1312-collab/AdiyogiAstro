version: '3.8'

services:
  nakshatra:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-strong-secret-in-production}
      - DB_PATH=/app/data/nakshatra.db
    volumes:
      - nakshatra-data:/app/data
    restart: unless-stopped

volumes:
  nakshatra-data:
    driver: local

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200">
  <defs>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Laptop body -->
  <rect x="20" y="30" width="120" height="85" rx="5" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- Screen -->
  <rect x="25" y="35" width="110" height="75" rx="3" fill="url(#screenGrad)"/>
  <!-- Kundli chart on screen (diamond pattern) -->
  <rect x="50" y="45" width="60" height="55" fill="none" stroke="#FF6600" stroke-width="1" transform="rotate(45 80 72.5)" opacity="0.8"/>
  <rect x="57" y="52" width="46" height="41" fill="none" stroke="#FF6600" stroke-width="0.5" transform="rotate(45 80 72.5)" opacity="0.5"/>
  <!-- Planet labels on chart -->
  <text x="80" y="52" text-anchor="middle" font-size="6" fill="#FFD700" font-family="sans-serif">Ra</text>
  <text x="60" y="70" text-anchor="middle" font-size="6" fill="#FFD700" font-family="sans-serif">Su</text>
  <text x="100" y="70" text-anchor="middle" font-size="6" fill="#FFD700" font-family="sans-serif">Mo</text>
  <text x="80" y="80" text-anchor="middle" font-size="6" fill="#FFD700" font-family="sans-serif">Ju</text>
  <text x="70" y="90" text-anchor="middle" font-size="6" fill="#FFD700" font-family="sans-serif">Ve</text>
  <text x="90" y="90" text-anchor="middle" font-size="6" fill="#FFD700" font-family="sans-serif">Ma</text>
  <!-- Keyboard -->
  <rect x="15" y="115" width="130" height="10" rx="3" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="25" y="117" width="110" height="5" rx="1" fill="#555"/>
  <!-- Trackpad -->
  <rect x="60" y="126" width="40" height="4" rx="2" fill="#555"/>
  <!-- CD/Box below -->
  <rect x="30" y="145" width="100" height="40" rx="4" fill="#FF6600" stroke="#CC5200" stroke-width="1"/>
  <text x="80" y="162" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="sans-serif">कुंडली PRO</text>
  <text x="80" y="175" text-anchor="middle" font-size="7" fill="#FFE0B2" font-family="sans-serif">Kundli Software</text>
  <!-- Stars -->
  <text x="35" y="155" font-size="8" fill="#FFE0B2" opacity="0.6">✦</text>
  <text x="120" y="155" font-size="8" fill="#FFE0B2" opacity="0.6">✦</text>
</svg>
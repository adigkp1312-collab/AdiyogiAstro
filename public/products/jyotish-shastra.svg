  <text x="82" y="118" text-anchor="middle" font-size="8" fill="#FFD700" opacity="0.7">♌</text>
  <text x="60" y="110" text-anchor="middle" font-size="8" fill="#FFD700" opacity="0.7">♍</text>
  <text x="52" y="94" text-anchor="middle" font-size="8" fill="#FFD700" opacity="0.7">♎</text>
  <text x="60" y="76" text-anchor="middle" font-size="8" fill="#FFD700" opacity="0.7">♏</text>

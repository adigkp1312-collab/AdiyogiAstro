<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200">
  <defs>
    <radialGradient id="rudrGrad" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#D2691E"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </radialGradient>
  </defs>
  <!-- Mala string loop -->
  <ellipse cx="80" cy="95" rx="45" ry="55" fill="none" stroke="#CD853F" stroke-width="2" opacity="0.4"/>
  <!-- Rudraksha beads around the loop -->
  <circle cx="80" cy="40" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <line x1="76" y1="38" x2="84" y2="38" stroke="#654321" stroke-width="0.5" opacity="0.6"/>
  <line x1="76" y1="42" x2="84" y2="42" stroke="#654321" stroke-width="0.5" opacity="0.6"/>

  <circle cx="100" cy="48" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <circle cx="115" cy="65" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <circle cx="122" cy="85" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <circle cx="120" cy="107" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <circle cx="108" cy="125" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <circle cx="90" cy="140" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <circle cx="70" cy="140" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <circle cx="52" cy="125" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <circle cx="40" cy="107" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <circle cx="38" cy="85" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <circle cx="45" cy="65" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <circle cx="60" cy="48" r="7" fill="url(#rudrGrad)" stroke="#654321" stroke-width="1"/>
  <!-- Guru bead (larger, bottom) -->
  <circle cx="80" cy="150" r="10" fill="#8B4513" stroke="#654321" stroke-width="1.5"/>
  <line x1="74" y1="148" x2="86" y2="148" stroke="#654321" stroke-width="0.6" opacity="0.6"/>
  <line x1="74" y1="152" x2="86" y2="152" stroke="#654321" stroke-width="0.6" opacity="0.6"/>
  <!-- Tassel -->
  <line x1="80" y1="160" x2="80" y2="180" stroke="#CD853F" stroke-width="2"/>
  <line x1="76" y1="175" x2="80" y2="180" stroke="#CD853F" stroke-width="1.5"/>
  <line x1="84" y1="175" x2="80" y2="180" stroke="#CD853F" stroke-width="1.5"/>
  <!-- Om symbol -->
  <text x="80" y="100" text-anchor="middle" font-size="20" fill="#FFD700" opacity="0.3" font-family="serif">ॐ</text>
</svg>
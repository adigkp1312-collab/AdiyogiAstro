<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200">
  <defs>
    <radialGradient id="gomedGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#E8A87C"/>
      <stop offset="40%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#7B241C"/>
    </radialGradient>
    <radialGradient id="gomedGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#E8A87C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E8A87C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow effect -->
  <circle cx="80" cy="90" r="65" fill="url(#gomedGlow)"/>
  <!-- Ring setting -->
  <ellipse cx="80" cy="140" rx="30" ry="8" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
  <rect x="60" y="115" width="40" height="25" rx="3" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
  <!-- Prongs -->
  <line x1="62" y1="115" x2="58" y2="100" stroke="#B8860B" stroke-width="2" stroke-linecap="round"/>
  <line x1="98" y1="115" x2="102" y2="100" stroke="#B8860B" stroke-width="2" stroke-linecap="round"/>
  <line x1="72" y1="115" x2="68" y2="95" stroke="#B8860B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="115" x2="92" y2="95" stroke="#B8860B" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Gemstone (oval cut) -->
  <ellipse cx="80" cy="80" rx="30" ry="25" fill="url(#gomedGrad)" stroke="#7B241C" stroke-width="1"/>
  <!-- Facet lines -->
  <line x1="80" y1="55" x2="65" y2="80" stroke="#E8A87C" stroke-width="0.5" opacity="0.4"/>
  <line x1="80" y1="55" x2="95" y2="80" stroke="#E8A87C" stroke-width="0.5" opacity="0.4"/>
  <line x1="80" y1="55" x2="80" y2="80" stroke="#E8A87C" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="80" x2="80" y2="105" stroke="#E8A87C" stroke-width="0.5" opacity="0.4"/>
  <line x1="110" y1="80" x2="80" y2="105" stroke="#E8A87C" stroke-width="0.5" opacity="0.4"/>
  <!-- Light reflection -->
  <ellipse cx="70" cy="72" rx="8" ry="5" fill="white" opacity="0.2" transform="rotate(-20 70 72)"/>
  <!-- Sparkles -->
  <text x="45" y="55" font-size="10" fill="#FFD700" opacity="0.6">✦</text>
  <text x="115" y="65" font-size="8" fill="#FFD700" opacity="0.5">✦</text>
  <text x="105" y="45" font-size="6" fill="#FFD700" opacity="0.4">✦</text>
  <!-- Label -->
  <text x="80" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#C0392B" font-family="sans-serif">गोमेद रत्न</text>
  <text x="80" y="182" text-anchor="middle" font-size="7" fill="#999" font-family="sans-serif">Certified Hessonite</text>
  <!-- Certified badge -->
  <circle cx="125" cy="40" r="12" fill="#22C55E" stroke="white" stroke-width="1"/>
  <text x="125" y="43" text-anchor="middle" font-size="6" font-weight="bold" fill="white" font-family="sans-serif">✓</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200">
  <defs>
    <linearGradient id="bookGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#CC3300"/>
    </linearGradient>
  </defs>
  <!-- Book shape -->
  <rect x="25" y="15" width="110" height="160" rx="4" fill="url(#bookGrad)" stroke="#B22000" stroke-width="1"/>
  <rect x="30" y="15" width="105" height="160" rx="3" fill="url(#bookGrad)"/>
  <!-- Spine -->
  <rect x="25" y="15" width="8" height="160" rx="2" fill="#B22000" opacity="0.5"/>
  <!-- Title area -->
  <rect x="40" y="30" width="85" height="55" rx="3" fill="white" opacity="0.95"/>
  <text x="82" y="50" text-anchor="middle" font-size="22" font-weight="bold" fill="#FF6600" font-family="serif">2026</text>
  <text x="82" y="68" text-anchor="middle" font-size="9" font-weight="bold" fill="#333" font-family="sans-serif">सम्पूर्ण राशिफल</text>
  <text x="82" y="80" text-anchor="middle" font-size="7" fill="#666" font-family="sans-serif">Complete Rashifal</text>
  <!-- Stars decoration -->
  <circle cx="50" cy="105" r="3" fill="#FFD700" opacity="0.9"/>
  <circle cx="70" cy="100" r="2" fill="#FFD700" opacity="0.7"/>
  <circle cx="110" cy="108" r="2.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="90" cy="95" r="1.5" fill="#FFD700" opacity="0.6"/>
  <!-- Zodiac wheel hint -->
  <circle cx="82" cy="130" r="25" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
  <circle cx="82" cy="130" r="18" fill="none" stroke="#FFD700" stroke-width="0.8" opacity="0.4"/>
  <text x="82" y="134" text-anchor="middle" font-size="12" fill="#FFD700" opacity="0.8">☸</text>
  <!-- NEW badge -->
  <rect x="95" y="20" width="30" height="14" rx="2" fill="#22C55E"/>
  <text x="110" y="30" text-anchor="middle" font-size="8" font-weight="bold" fill="white" font-family="sans-serif">NEW</text>
</svg>